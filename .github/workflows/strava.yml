name: Refresh Strava Activity

on:
  schedule:
    - cron: '0 */6 * * *'   # runs every 6 hours
  workflow_dispatch:          # allows manual run from GitHub Actions tab

jobs:
  fetch-strava:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get fresh Strava access token
        id: token
        run: |
          response=$(curl -s -X POST https://www.strava.com/oauth/token \
            -d client_id=${{ secrets.STRAVA_CLIENT_ID }} \
            -d client_secret=${{ secrets.STRAVA_CLIENT_SECRET }} \
            -d grant_type=refresh_token \
            -d refresh_token=${{ secrets.STRAVA_REFRESH_TOKEN }})
          echo "access_token=$(echo $response | python3 -c \"import sys,json; print(json.load(sys.stdin)['access_token'])\")" >> $GITHUB_OUTPUT

      - name: Fetch latest activity from Strava API
        run: |
          curl -s "https://www.strava.com/api/v3/athlete/activities?per_page=1" \
            -H "Authorization: Bearer ${{ steps.token.outputs.access_token }}" \
            | python3 -c "
          import sys, json
          acts = json.load(sys.stdin)
          if not acts:
              print('{}')
              sys.exit(0)
          a = acts[0]
          out = {
              'name':                 a.get('name', ''),
              'type':                 a.get('sport_type', a.get('type', '')),
              'distance':             a.get('distance', 0),
              'moving_time':          a.get('moving_time', 0),
              'average_speed':        a.get('average_speed', 0),
              'start_date_local':     a.get('start_date_local', ''),
              'total_elevation_gain': a.get('total_elevation_gain', 0),
          }
          print(json.dumps(out, indent=2))
          " > strava_data.json

      - name: Commit updated data if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add strava_data.json
          git diff --staged --quiet || git commit -m "chore: refresh Strava activity data [skip ci]"
          git push
